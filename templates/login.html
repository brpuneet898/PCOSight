<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Login | PCOSight</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-purple-50 via-rose-50 to-teal-50 flex items-center justify-center px-4">

  <div class="w-full max-w-md bg-white rounded-3xl shadow-xl p-8 border border-purple-100">
    <h1 class="text-3xl font-bold text-center text-purple-700 mb-2">Welcome Back</h1>
    <p class="text-center text-gray-500 mb-8">Login to continue to PCOSight</p>

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        {% for category, message in messages %}
          <div class="mb-4 p-3 rounded-xl text-sm
            {% if category == 'success' %}
              bg-green-100 text-green-700
            {% else %}
              bg-red-100 text-red-700
            {% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      {% endif %}
    {% endwith %}

    <form method="POST" action="{{ url_for('login') }}" class="space-y-5">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Username</label>
        <input type="text" name="username" required
               class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:outline-none">
      </div>

      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Password</label>
        <input type="password" name="password" required
               class="w-full px-4 py-3 rounded-xl border border-gray-300 focus:ring-2 focus:ring-purple-500 focus:outline-none">
      </div>

      <button type="submit"
              class="w-full bg-purple-700 text-white py-3 rounded-xl font-semibold hover:bg-purple-800 transition">
        Login
      </button>
    </form>

    <p class="text-center text-sm text-gray-600 mt-6">
      New user?
      <a href="{{ url_for('register') }}" class="text-purple-700 font-semibold hover:underline">
        Register here
      </a>
    </p>
  </div>

</body>
</html>
