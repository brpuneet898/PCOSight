<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Dashboard | PCOSight</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-purple-50 via-rose-50 to-teal-50">

  <nav class="bg-white shadow-sm px-8 py-5 flex justify-between items-center">
    <h1 class="text-2xl font-bold text-purple-700">PCOSight</h1>

    <div class="flex items-center gap-4">
      <span class="text-gray-600">Hi, {{ username }}</span>
      <a href="{{ url_for('logout') }}"
         class="bg-red-100 text-red-700 px-4 py-2 rounded-xl hover:bg-red-200 transition">
        Logout
      </a>
    </div>
  </nav>

  <main class="max-w-6xl mx-auto px-8 py-16">
    <div class="bg-white rounded-3xl shadow-xl p-10 border border-purple-100">
      <h2 class="text-4xl font-bold text-gray-900 mb-4">Dashboard</h2>
      <p class="text-gray-600">
        Welcome to your PCOSight dashboard. Prediction forms, model results, explainability, and recommendations can be added here next.
      </p>
    </div>
  </main>

</body>
</html>
